apiVersion: apps/v1
kind: Deployment
metadata:
  name: experience-api
  namespace: journey-recovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: experience-api
  template:
    metadata:
      labels:
        app: experience-api
    spec:
      containers:
        - name: experience-api
          image: journey-recovery/experience-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/journey_recovery
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: journey-recovery-postgres-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: journey-recovery-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: experience-api
  namespace: journey-recovery
spec:
  selector:
    app: experience-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
