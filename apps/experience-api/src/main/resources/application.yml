spring:
  application:
    name: experience-api
  datasource:
    url: jdbc:postgresql://localhost:5432/journey_recovery
    username: recovery
    password: recovery
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: always

anthropic:
  model: claude-opus-4-7
  enabled: false
  drafting:
    prompt-cache-ttl: 1h
    timeout-seconds: 20

server:
  port: 8080
  shutdown: graceful

logging:
  structured:
    format:
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: experience-api
      service: journey-recovery
  tracing:
    sampling:
      probability: 1.0
