spring:
  application:
    name: experience-api
  datasource:
    url: jdbc:postgresql://localhost:5432/journey_recovery
    username: recovery
    password: recovery
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: always

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
