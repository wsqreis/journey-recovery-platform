name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run checks
        run: ./gradlew clean check

      - name: Build experience-api image
        run: docker build -f apps/experience-api/Dockerfile -t journey-recovery/experience-api:ci .

      - name: Build decision-worker image
        run: docker build -f apps/decision-worker/Dockerfile -t journey-recovery/decision-worker:ci .
